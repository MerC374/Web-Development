<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline and Block element</title>
    <style>
        p{
            background-color: beige;
        }
        #google{
            background-color: rgb(208, 97, 97);
        }
        div{
            background-color: rgb(242, 174, 84);
        }
        span{
            background-color: #676060a5;
        }
    </style>
</head>
<body>
    <p>Paragraph: Block element</p>
    <a href="https://google.com" id="google">anchor: inline</a>
    <div>Div: block</div>
    <span>
        Span: inline. Now the other inline will add in same line
        <a href="">anchor: inline</a>
    </span>
    <br>
    All of these can be change by using CSS, they are not fix.
    
</body>
</html>
