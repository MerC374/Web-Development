<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms & input tags</title>
</head>
<body>
    <form action="post">
        <div>
            <label for="name">Name: </label> 
            <input type="text" id="name" name="username" placeholder="Enter name" required>
        </div>

        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label> 
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label> 
        </div>

        <div>
            <input type="checkbox" id="check" name="check" value="yes">
            <label for="check">Say hello</label>
        </div>

        <div>
            <select name="fruit" id="fruit">
                <option value="banana">Banana</option>
                <option value="apple">Apple</option>
                <option value="orange">Orange</option>
            </select>
        </div>

        <div>
            <label for="comment">Enter your comment: </label>
            <br>
            <textarea name="comment" id="comment" rows="7" cols="50" placeholder="Enter your text here..."></textarea>
        </div>
    </form>
    <div>Quick Quiz: Write a vertically alingned form asking name, city and pincode of a person without using br tag.</div>
    <form action="post">
        <div>
            <label for="name">Name: </label>
            <input type="text" id="name" name="username" placeholder="Enter name">
        </div>
        <div>
            <label for="city">City: </label>
            <input type="text" id="city" name="cityname" placeholder="Enter city">
        </div>
        <div>
            <label for="pincode">Pincode: </label>
            <input type="text" id="pincode" name="pincode" placeholder="Enter pincode">
        </div>
    </form>
    
</body>
</html>
