<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Id & Classes</title>
    <style>
        .div{
            background-color: aquamarine;
        }
        .span{
            background-color: rgba(108, 66, 2, 0.473);
        }
        #firstdiv{
            color: blue;
        }
        #seconddiv{
            color: brown;
        }
        #firstspan{
            color: rgb(214, 10, 10);
        }
        #secondspan{
            color: rgba(137, 43, 226, 0.486);
        }
    </style>
</head>
<body>
    <div id="firstdiv" class="div">FIRST DIV</div>
    <div id="seconddiv" class="div">SECOND DIV</div>
    <span id="firstspan" class="span">FIRST SPAN</span>
    <span id="secondspan" class="span">SECOND SPAN</span>
</body>
</html>
