<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2</title>
    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            margin:0;
            line-height: 1.2;
            background-color: #eef2f3;
        }
        .main{
            border-radius: 10px;
            width: 460px;
            max-width: 90%;
            padding-bottom: 20px;
            background-color: white;
            box-shadow: 0px 0px 15px grey;
            padding: 15px;
        }
        .img{
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        .card-img{
            width: 95%;
            height: 400px;
            border-radius: 10px;
            object-fit: cover;
        }
        .marker ul{
            display: flex;
            list-style: none;
            gap: 20px;
            padding: 0;
        }
        .marker li{
            border: 1px solid grey;
            font-family: Arial, Helvetica, sans-serif;
            padding: 4px 8px;
            border-radius: 20px;
            color: rgb(86, 86, 86);
        }
        .head{
            font-family: Arial, Helvetica, sans-serif;
            color: rgba(0, 0, 0, 0.9);
        }
        .head h1{
            margin: 0;
        }
        .body{
            font-family: Arial, Helvetica, sans-serif;
            font-size: large;
            color: rgb(86, 86, 86);
        }
        .foot{
            margin-top: 15px;
            display: flex;
            justify-content: center;
        }
        button.read-more{
            border: none; 
            border-radius: 20px;
            padding: 18px;
            font-size: 16px;
            font-weight: bold;
            background-color: rgba(173, 216, 230, 0.645); 
            color: rgb(43, 122, 154)
        }
    </style>
</head>
<body>
    <!-- Write a css amd html code to generate a Card by your own. -->
    <div class="main">
        <div class="img">
            <img src="https://i.guim.co.uk/img/media/f75f84778dc6c20e519223cdd39ec0f974f2c9b0/0_239_3583_2150/master/3583.jpg?width=1200&height=1200&quality=85&auto=format&fit=crop&s=ef058df145838fa692ff5ecd866bf492" class="card-img" alt="Wildlife">
        </div>

        <div class="marker">
            <ul>
                <li>Nature</li>
                <li>Wildlife</li>
            </ul>
        </div>

        <header class="head">
            <h1>Lago di Braies</h1>
        </header>
        <p class="body">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Consectetur assumenda earum expedita molestiae fugit. Incidunt cum consequuntur odit dolorem nulla. That's the card i had made for my practice.
        </p>
        <footer class="foot">
            <button class="read-more">Read More</button>
        </footer>
    </div>
</body>
</html>
