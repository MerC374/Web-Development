<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model & Text styling</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            background-color: aqua;
        }
        .box1{
            color: rgb(159, 159, 0);
            padding: 5px;
            margin: 5px;
            border: 2px solid black;
            height: 100px;
        }
        .box2{
            color: red;
            height: 50px;
        }
        
        h1{
            font-family: 'Courier New', Courier, monospace;
            font-weight: 60;
        }
        p{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: x-large;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="box box1">I am box1</div>
    <div class="box box2">I am box2</div>
    <h1>Hello</h1>
    <p>Hello i am a Font in paragraph</p>
</body>
</html>
