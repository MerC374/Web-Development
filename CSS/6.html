<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Lists</title>
    <style>
        nav ul li{
            border: 1px solid black;
            background-color: bisque;
            list-style-position: inside;
        }
        .first{
            list-style: devanagari;
        }
        .sec{
            list-style-type: "🫣";
        }
        .thir{
            list-style-image: url(https://www.shutterstock.com/image-vector/bart-simpson-cartoon-character-isolated-260nw-2413951549.jpg);
        }
    </style>
</head>
<body>
    <nav>
        <ul class="first">
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>
    <nav>
        <ul class="sec">
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>
    <nav>
        <ul class="thir">
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>
    
</body>
</html>
